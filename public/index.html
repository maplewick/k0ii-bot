<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K0ii Clan</title>
  <link href="https://fonts.googleapis.com/css2?family=Blinker:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #09070a;
      --surface: #110d0e;
      --surface2: #1a1214;
      --border: #2d1f1f;
      --accent: #f97316;
      --accent2: #ea4f1e;
      --gold: #f59e0b;
      --silver: #94a3b8;
      --bronze: #b45309;
      --text: #f0e6e0;
      --muted: #7a5c52;
      --green: #10b981;
      --red: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Blinker', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 15% 0%, rgba(232, 99, 26, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 100%, rgba(192, 57, 43, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(140, 40, 20, 0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    /* Header */
    header {
      padding: 40px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .clan-name {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #f97316, #ea4f1e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .clan-sub {
      font-family: 'Blinker', sans-serif;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 2px;
      margin-top: 4px;
    }

    .battle-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 20px;
      text-align: right;
    }

    .battle-label {
      font-family: 'Blinker', sans-serif;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .battle-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      margin-top: 2px;
    }

    /* Stats bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #f97316, #ea4f1e);
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'Blinker', sans-serif;
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Leaderboard */
    .section-title {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'Blinker', sans-serif;
      margin-bottom: 16px;
    }

    .leaderboard { display: flex; flex-direction: column; gap: 8px; margin-bottom: 60px; }

    .member-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      display: grid;
      grid-template-columns: 48px 52px 1fr auto auto;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, background 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .member-row:hover {
      border-color: var(--accent);
      background: var(--surface2);
      transform: translateX(4px);
    }

    .rank {
      font-family: 'Blinker', sans-serif;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
    }

    .rank-1 { color: var(--gold); }
    .rank-2 { color: var(--silver); }
    .rank-3 { color: var(--bronze); }
    .rank-n { color: var(--muted); font-size: 14px; }

    .member-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
    }

    .member-avatar-placeholder {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--surface2);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 16px;
    }

    .member-info { min-width: 0; }

    .member-username {
      font-size: 17px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .member-meta {
      font-size: 12px;
      color: var(--muted);
      font-family: 'Blinker', sans-serif;
      margin-top: 2px;
    }

    .member-role {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .role-owner { background: rgba(245,158,11,0.15); color: var(--gold); border: 1px solid rgba(245,158,11,0.3); }
    .role-officer { background: rgba(232,99,26,0.1); color: var(--accent); border: 1px solid rgba(232,99,26,0.2); }
    .role-member { background: rgba(100,116,139,0.1); color: var(--muted); border: 1px solid rgba(100,116,139,0.2); }

    .member-points { text-align: right; }

    .points-value {
      font-family: 'Blinker', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .points-gain {
      font-size: 12px;
      font-family: 'Blinker', sans-serif;
      margin-top: 2px;
    }

    .gain-pos { color: var(--green); }
    .gain-neg { color: var(--red); }
    .gain-zero { color: var(--muted); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      padding: 32px;
      position: relative;
      transform: translateY(20px);
      transition: transform 0.2s;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-close {
      position: absolute;
      top: 16px; right: 16px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
    }

    .modal-close:hover { color: var(--text); }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .modal-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 3px solid #f97316;
      object-fit: cover;
    }

    .modal-avatar-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 3px solid var(--border);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .modal-username {
      font-size: 24px;
      font-weight: 700;
    }

    .modal-username a {
      color: inherit;
      text-decoration: none;
    }

    .modal-username a:hover { color: var(--accent); }

    .modal-fields { display: flex; flex-direction: column; gap: 12px; }

    .modal-field {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
    }

    .field-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'Blinker', sans-serif;
      margin-bottom: 4px;
    }

    .field-value {
      font-size: 16px;
      font-weight: 600;
    }

    .passes-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .pass-tag {
      font-size: 12px;
      background: rgba(232,99,26,0.08);
      border: 1px solid rgba(232,99,26,0.2);
      color: var(--accent);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: 'Blinker', sans-serif;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
      font-family: 'Blinker', sans-serif;
      letter-spacing: 2px;
    }

    .loading-dot {
      display: inline-block;
      animation: blink 1.2s infinite;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }

    .error-msg {
      text-align: center;
      padding: 60px 0;
      color: var(--red);
      font-family: 'Blinker', sans-serif;
    }

    .footer {
      text-align: center;
      padding: 32px 0;
      color: var(--muted);
      font-size: 13px;
      font-family: 'Blinker', sans-serif;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-inner">
        <div>
          <div class="clan-name">K0ii</div>
          <div class="clan-sub">PET SIMULATOR 99 · CLAN ROSTER</div>
        </div>
        <div class="battle-badge">
          <div class="battle-label">Active Battle</div>
          <div class="battle-name" id="battle-name">—</div>
        </div>
      </div>
    </header>

    <div class="stats-bar" id="stats-bar">
      <div class="stat-card">
        <div class="stat-value" id="stat-members">—</div>
        <div class="stat-label">Members Linked</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-points">—</div>
        <div class="stat-label">Total Battle Pts</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-active">—</div>
        <div class="stat-label">Contributing</div>
      </div>
    </div>

    <div class="section-title">Leaderboard</div>
    <div class="leaderboard" id="leaderboard">
      <div class="loading">LOADING<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>
    </div>

    <div class="footer">K0ii · Updated live from PS99 API · Made by Zykzo</div>
  </div>

  <!-- Member Modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-header">
        <div id="modal-avatar-wrap"></div>
        <div>
          <div class="modal-username" id="modal-username"></div>
          <div class="member-meta" id="modal-meta"></div>
        </div>
      </div>
      <div class="modal-fields" id="modal-fields"></div>
    </div>
  </div>

  <script>
    let membersData = [];

    function fmt(n) {
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
      if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
      return n.toLocaleString();
    }

    function rankClass(i) {
      if (i === 0) return 'rank-1';
      if (i === 1) return 'rank-2';
      if (i === 2) return 'rank-3';
      return 'rank-n';
    }

    function rankLabel(i) {
      if (i === 0) return '🥇';
      if (i === 1) return '🥈';
      if (i === 2) return '🥉';
      return `#${i + 1}`;
    }

    function roleClass(role) {
      if (role === 'Owner') return 'role-owner';
      if (role === 'Officer') return 'role-officer';
      return 'role-member';
    }

    function gainHtml(gain) {
      if (gain === null) return '';
      if (gain > 0) return `<div class="points-gain gain-pos">+${fmt(gain)}/hr</div>`;
      if (gain < 0) return `<div class="points-gain gain-neg">${fmt(gain)}/hr</div>`;
      return `<div class="points-gain gain-zero">+0/hr</div>`;
    }

    function avatarHtml(avatar, size = 40) {
      if (avatar) return `<img class="member-avatar" src="${avatar}" width="${size}" height="${size}" onerror="this.style.display='none'" />`;
      return `<div class="member-avatar-placeholder">👤</div>`;
    }

    function openModal(member) {
      const wrap = document.getElementById('modal-avatar-wrap');
      wrap.innerHTML = member.avatar
        ? `<img class="modal-avatar" src="${member.avatar}" onerror="this.outerHTML='<div class=modal-avatar-placeholder>👤</div>'" />`
        : `<div class="modal-avatar-placeholder" style="width:64px;height:64px;border-radius:50%;border:3px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:28px">👤</div>`;

      document.getElementById('modal-username').innerHTML =
        `<a href="https://www.roblox.com/users/${member.roblox_id}/profile" target="_blank">${member.roblox_username}</a>`;
      document.getElementById('modal-meta').textContent = member.role;

      const fields = [];

      fields.push(`
        <div class="modal-field">
          <div class="field-label">Battle Points${member.battleName ? ` · ${member.battleName}` : ''}</div>
          <div class="field-value">${member.battlePoints.toLocaleString()}${member.hourlyGain !== null ? ` <span style="font-size:13px;color:${member.hourlyGain >= 0 ? 'var(--green)' : 'var(--red)'};">(${member.hourlyGain >= 0 ? '+' : ''}${fmt(member.hourlyGain)}/hr)</span>` : ''}</div>
        </div>`);

      if (member.placement) {
        fields.push(`
          <div class="modal-field">
            <div class="field-label">Clan Placement</div>
            <div class="field-value">${member.placement}</div>
          </div>`);
      }

      if (member.timezone) {
        fields.push(`
          <div class="modal-field">
            <div class="field-label">Timezone</div>
            <div class="field-value">${member.timezone} · ${member.region ?? ''}</div>
          </div>`);
      }

      if (member.alts && member.alts.length > 0) {
        fields.push(`
          <div class="modal-field">
            <div class="field-label">Alt Accounts</div>
            <div class="field-value">${member.alts.map(a => a.roblox_username).join(', ')}</div>
          </div>`);
      }

      document.getElementById('modal-fields').innerHTML = fields.join('');
      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal(e) {
      if (e && e.target !== document.getElementById('modal-overlay') && e.type !== 'click') return;
      if (e && e.currentTarget === document.getElementById('modal-overlay') && e.target !== e.currentTarget) return;
      document.getElementById('modal-overlay').classList.remove('open');
    }

    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    async function load() {
      try {
        const res = await fetch('/api/members');
        const data = await res.json();
        membersData = data.members;

        document.getElementById('battle-name').textContent = data.battle ?? 'No active battle';
        document.getElementById('stat-members').textContent = membersData.length;

        const totalPts = membersData.reduce((s, m) => s + m.battlePoints, 0);
        document.getElementById('stat-points').textContent = fmt(totalPts);

        const contributing = membersData.filter(m => m.battlePoints > 0).length;
        document.getElementById('stat-active').textContent = contributing;

        const lb = document.getElementById('leaderboard');
        if (membersData.length === 0) {
          lb.innerHTML = '<div class="error-msg">No linked members found.</div>';
          return;
        }

        lb.innerHTML = membersData.map((m, i) => `
          <div class="member-row" onclick='openModal(${JSON.stringify(m).replace(/'/g, "&#39;")})'>
            <div class="rank ${rankClass(i)}">${rankLabel(i)}</div>
            <div>${avatarHtml(m.avatar)}</div>
            <div class="member-info">
              <div class="member-username">${m.roblox_username}</div>
              <div class="member-meta">${m.timezone ?? '—'}</div>
            </div>
            <div class="member-role ${roleClass(m.role)}">${m.role}</div>
            <div class="member-points">
              <div class="points-value">${fmt(m.battlePoints)}</div>
              ${gainHtml(m.hourlyGain)}
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('leaderboard').innerHTML = `<div class="error-msg">Failed to load data.<br>${e.message}</div>`;
      }
    }

    load();
    setInterval(load, 60000);
  </script>
</body>
</html>
